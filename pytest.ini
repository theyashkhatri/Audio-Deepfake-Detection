[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --color=yes
    --strict-markers
markers =
    slow: marks tests as slow (deselect with -m "not slow")
    requires_dataset: marks tests needing real ASVspoof data
    gpu: marks tests requiring GPU
log_cli = true
log_cli_level = WARNING
